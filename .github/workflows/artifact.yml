name: 'Artifact'

on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  build:

    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      actions: 'write'

    steps:
      - uses: 'actions/checkout@v6'
        with:
          submodules: 'recursive'

      - name: 'Setup hugo'
        run: |
          curl -sL https://github.com/gohugoio/hugo/releases/download/v0.160.0/hugo_extended_withdeploy_0.160.0_linux-amd64.tar.gz | tar -zx -C ../

      - name: 'Build with hugo'
        run: |
          ../hugo

      - name: 'Upload artifacts'
        uses: 'actions/upload-artifact@v6'
        with:
          path: |
            public/*
